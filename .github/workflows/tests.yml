name: data-extraction-evaluation-toolkit tests
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # Skips intermediate builds and cancels intermediate builds
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  fetch-abstract-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12.11"
    if: github.event.pull_request.draft == false
    env:
      # Configure a constant location for the uv cache
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Install a specific version of uv.
          version: "0.8.4"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run test with pytest
        run: uv run pytest --cov=src/app --cov-report=xml

      # - name: Code coverage reporting
      #   uses: irongut/CodeCoverageSummary@v1.3.0
      #   with:
      #     filename: coverage.xml
      #     badge: true
      #     fail_below_min: true
      #     format: markdown
      #     hide_branch_rate: false
      #     hide_complexity: true
      #     indicators: true
      #     output: file
      #     thresholds: "80 90"

      # - name: Add title to coverage markdown file
      #   run: |
      #     echo '## data-extraction-evaluation-toolkit coverage' > fetch-abstracts-coverage-results.md
      #     echo '---' >> data-extraction-evaluation-toolkit.md
      #     cat code-coverage-results.md >> data-extraction-evaluation-toolkit-results.md

      # - name: Add Coverage PR Comment
      #   uses: marocchino/sticky-pull-request-comment@v2
      #   if: github.event_name == 'pull_request'
      #   with:
      #     header: "data-extraction-evaluation-toolkit Coverage"
      #     recreate: true
      #     path: data-extraction-evaluation-toolkit-coverage-results.md

      - name: Minimize uv cache
        run: uv cache prune --ci
