name: data-extraction-evaluation-toolkit tests

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read
  pull-requests: write

jobs:
  fetch-abstract-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12.11"
    if: github.event.pull_request.draft == false
    env:
      UV_CACHE_DIR: /tmp/.uv-cache  # Configure a constant location for the uv cache
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.11"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run test with pytest
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" == "main" ]; then
            # Omit --ignore for PRs to main
            uv run pytest --cov=app/ --cov-report=xml
          else
            # Include --ignore for PRs to development
            uv run pytest --ignore=tests/test_parser_real_files.py --cov=app/ --cov-report=xml
          fi

      - name: Code coverage reporting
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: file
          thresholds: "80 90"

      - name: Add title to coverage markdown file
        run: |
          echo '## data-extraction-evaluation-toolkit coverage' > fetch-abstracts-coverage-results.md
          echo '---' >> data-extraction-evaluation-toolkit.md
          cat code-coverage-results.md >> data-extraction-evaluation-toolkit-results.md

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: "data-extraction-evaluation-toolkit Coverage"
          recreate: true
          path: data-extraction-evaluation-toolkit-coverage-results.md

      - name: Minimize uv cache
        run: uv cache prune --ci
