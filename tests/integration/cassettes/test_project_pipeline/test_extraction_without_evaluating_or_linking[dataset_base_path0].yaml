      in alternate local anesthetics of intermediate duration , such as mepivacaine
      . This prospective randomized , double-blinded , dose-response study examined
      the anesthetic and recovery profiles of 60- and 80-mg doses of preservative-free
      plain mepivacaine for ambulatory spinal anesthesia . Sixty patients undergoing
      ambulatory anterior cruciate ligament repair of the knee under spinal anesthesia
      were randomized into two groups ; Group 1 ( 29 patients ) received 4 mL of 1.5
      % ( 60-mg dose ) and Group 2 ( 31 patients ) received 4 mL of 2 % ( 80-mg dose
      ) of plain mepivacaine . All patients received a combined spinal-epidural anesthetic
