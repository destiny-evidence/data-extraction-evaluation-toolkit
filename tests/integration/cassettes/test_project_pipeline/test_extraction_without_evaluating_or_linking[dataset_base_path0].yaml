      longer in Group 2 ( 146 +/- 28 min in Group 1 versus 159 +/- 19 min in Group
      2 ) . All of the ambulatory milestones were significantly faster in Group 1
      . Side effects , such as hypotension and emesis were negligible , severe bradycardia
      and urinary retention did not occur , and none of the patients in the two groups
      reported transient neurological symptoms over 24 h. In conclusion , plain mepivacaine
      in a 60- or 80-mg dose is a suitable local anesthetic choice for ambulatory
      spinal anesthesia with respect to anesthetic , as well as recovery profiles
      . IMPLICATIONS We evaluated the anesthetic and recovery profiles of 60- and
      80-mg doses of plain mepivacaine for ambulatory spinal anesthesia . Both doses
